name: Olive CPU CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-22.04
    outputs:
      run_tests: ${{ steps.filter.outputs.run_tests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$BASE_SHA" =~ ^0+$ ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            DIFF_RANGE=("$BASE_SHA...$HEAD_SHA")
          else
            DIFF_RANGE=("$BASE_SHA" "$HEAD_SHA")
          fi

          if ! git diff --quiet "${DIFF_RANGE[@]}" -- .github/workflows/cpu-ci.yml; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "${DIFF_RANGE[@]}" -- . \
            ":(exclude)docs/**" \
            ":(exclude)README.md" \
            ":(exclude)CONTRIBUTING.md" \
            ":(exclude)LICENSE" \
            ":(exclude).github/**" \
            ":(exclude)mcp/**" \
            ":(exclude)notebooks/**" \
            ":(exclude)scripts/**"; then
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          fi

  cpu_tests:
    name: ${{ matrix.name }} CPU unit tests
    needs: changes
    if: needs.changes.outputs.run_tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            platform: linux
          - name: Windows
            os: windows-2022
            platform: windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 300
    env:
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            test/requirements-test.txt
            test/requirements-test-cpu.txt

      - name: Install PyTorch
        run: python -m pip install torch

      - name: Install Olive
        run: python -m pip install .

      - name: Install ONNX Runtime
        run: python -m pip install onnxruntime

      - name: Install pytest
        run: python -m pip install pytest

      - name: Install test dependencies
        run: python -m pip install -r test/requirements-test-cpu.txt

      - name: List installed packages
        run: python -m pip list

      - name: Log in to Hugging Face when available
        env:
          HF_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
        run: >-
          python -c "import os; from huggingface_hub import login;
          token = os.environ.get('HF_TOKEN');
          login(token=token) if token else print('Hugging Face token unavailable; continuing anonymously')"

      - name: Create test output directory
        run: python -c "from pathlib import Path; Path('logs').mkdir(exist_ok=True)"

      - name: Run tests
        run: >-
          python -m coverage run --source=olive -m pytest -v -s -p no:warnings
          --disable-warnings --log-cli-level=WARNING
          --junitxml=logs/test-TestOlive-${{ matrix.platform }}.xml
          -m "not openvino and not amd" test
          --basetemp "${{ runner.temp }}/pytest"

      - name: Generate coverage report
        if: always()
        continue-on-error: true
        run: python -m coverage xml -o coverage-${{ matrix.platform }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-test-results-${{ matrix.platform }}
          path: |
            logs/*.xml
            coverage-${{ matrix.platform }}.xml
          if-no-files-found: warn
          retention-days: 14

  cpu_ci:
    name: Olive CPU CI
    needs:
      - changes
      - cpu_tests
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Check CPU test results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          RUN_TESTS: ${{ needs.changes.outputs.run_tests }}
          TEST_RESULT: ${{ needs.cpu_tests.result }}
        run: |
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            exit 1
          fi
          if [[ "$RUN_TESTS" == "true" && "$TEST_RESULT" != "success" ]]; then
            exit 1
          fi
