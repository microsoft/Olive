name: Lint

on:
  push:
    branches:
      - main
      - rel-*
  pull_request:

jobs:
  optional-lint:
    name: Optional Lint
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: misspell # Check spellings as well
        uses: reviewdog/action-misspell@v1
        with:
          github_token: ${{ secrets.github_token }}
          locale: "US"
          reporter: github-pr-check
          level: info
          filter_mode: diff_context
          ignore: canceled,strat,hardlinked
          exclude: |
            ./NOTICE.txt
      - name: shellcheck # Static check shell scripts
        uses: reviewdog/action-shellcheck@v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-check
          level: info
          filter_mode: file

  lint-python-format:
    # Required workflow
    name: Python format
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # Version range or exact version of Python to use, using SemVer's version range syntax. Reads from .python-version if unset.
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          lintrunner init
      - name: Run lintrunner on all files
        run: |
          set +e
          if ! lintrunner --force-color --all-files --tee-json=lint.json -v; then
              echo ""
              echo -e "\e[1m\e[36mYou can reproduce these results locally by using \`lintrunner\`. To set up lintrunner locally, see https://github.com/microsoft/Olive/blob/main/CONTRIBUTING.md#linting .\e[0m"
              exit 1
          fi
      - name: Produce SARIF
        if: always()
        run: |
          python -m lintrunner_adapters to-sarif lint.json lintrunner.sarif
      - name: Upload SARIF file
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          # Path to SARIF file relative to the root of the repository
          sarif_file: lintrunner.sarif
          category: lintrunner
          checkout_path: ${{ github.workspace }}

  copilot-fix-lint:
    name: Copilot Fix Lint Errors
    needs: lint-python-format
    # Only run when lint-python-format fails on pull requests from the same repo (not forks)
    if: >-
      always()
      && needs.lint-python-format.result == 'failure'
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: copilot-fix-lint-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      issues: write
    steps:
      - name: Request Copilot to fix lint errors
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- copilot-lint-fix -->';

            // Avoid duplicate comments on workflow re-runs by checking all comment pages
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              },
            );

            if (comments.some(c => c.body?.includes(marker))) {
              core.info('Copilot lint fix already requested; skipping.');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              marker,
              '@copilot The lint check failed for this PR. Please fix all the lint errors and push the fixes to this branch.',
              '',
              `Failed workflow run: ${runUrl}`,
              '',
              'To reproduce and fix:',
              '1. Run `lintrunner --all-files` to see all lint errors',
              '2. Run `lintrunner --all-files -a` to auto-fix formatting issues',
              '3. Manually fix any remaining lint errors that cannot be auto-fixed',
              '4. Commit and push the fixes',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });

            core.info(`Requested Copilot to fix lint errors on PR #${prNumber}`);
