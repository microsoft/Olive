parameters:
  python_version: '3.8'
  onnxruntime: 'onnxruntime'
  torch: torch
  ort_nightly: false

steps:
- task: UsePythonVersion@0
  inputs:
    versionSpec: ${{ parameters.python_version }}
  displayName: Use Python ${{ parameters.python_version }}

- script: python -m pip install ${{ parameters.torch }}
  displayName: Install torch

- script: python -m pip install .
  displayName: Install Olive

- ${{ if parameters.ort_nightly }}:
  - script: |
      pip install onnxruntime
      pip uninstall -y onnxruntime
      ls /usr/local/
      wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/x86_64/cuda-keyring_1.1-1_all.deb
      sudo DEBIAN_FRONTEND=noninteractive apt-get install -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" ./cuda-keyring_1.1-1_all.deb
      sudo apt-get update
      sudo apt-get -y install cudnn9-cuda-12
      pip install --pre ${{ parameters.onnxruntime }} --extra-index-url=https://aiinfra.pkgs.visualstudio.com/PublicPackages/_packaging/ORT-Nightly/pypi/simple/
    displayName: Install ${{ parameters.onnxruntime }} nightly
- ${{ else }}:
  - script: |
      pip install ${{ parameters.onnxruntime }}
    displayName: Install ${{ parameters.onnxruntime }}
