trigger:
  branches:
    include:
    - main
  paths:
    exclude:
    - docs/*
    - README.md
    - CONTRIBUTING.md
    - LICENSE
    - .github/*
pr:
  branches:
    include:
    - main
  paths:
    exclude:
    - docs/*
    - README.md
    - CONTRIBUTING.md
    - LICENSE
    # unrelated pipelines
    - .github/*

variables:
  runCodesignValidationInjection: false
  skipComponentGovernanceDetection: true

jobs:
# Linux unit tests
- template: job_templates/olive-test-cpu-template.yaml
  parameters:
    name: Linux_CPU_CI_Unit_Test
    pool: $(OLIVE_POOL_UBUNTU2004)
    pytest_marker: 'not openvino and not amd'

- template: job_templates/olive-test-cpu-template.yaml
  parameters:
    name: Linux_CPU_CI_Test_Model_Smoke
    pool: $(OLIVE_POOL_UBUNTU2004)
    pytest_marker: 'not openvino and not amd'
    test_path: 'test/cli/test_cli.py::test_optimize_dry_run_then_run_with_test_model'

- template: job_templates/olive-test-linux-gpu-template.yaml
  parameters:
    name: Linux_GPU_CI_Unit_Test
    pool: $(OLIVE_POOL_UBUNTU2004_GPU_V100)
    pytest_marker: 'not openvino and not amd'

# Windows unit tests
- template: job_templates/olive-test-cpu-template.yaml
  parameters:
    name: Windows_CPU_CI_Unit_Test
    pool: $(OLIVE_POOL_WIN2019)
    windows: True
    pytest_marker: 'not openvino and not amd'
