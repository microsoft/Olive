workflow_id: distilbert_cpu_onnx

input_model:
  type: HfModel
  model_path: distilbert/distilbert-base-uncased-finetuned-sst-2-english
  task: text-classification

systems:
  local_cpu:
    type: LocalSystem
    accelerators:
      - device: cpu
        execution_providers:
          - CPUExecutionProvider

passes:
  conversion:
    type: OnnxConversion
    target_opset: 20
    save_as_external_data: true
    all_tensors_to_one_file: true
  graph_optimization:
    type: OrtTransformersOptimization

search_strategy: false
evaluate_input_model: false
host: local_cpu
target: local_cpu
output_dir: olive-output
cache_dir: .olive-cache
log_severity_level: 1
